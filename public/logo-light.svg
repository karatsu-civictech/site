<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" role="img" aria-labelledby="title">
  <title id="title">ロゴ案H13 円相と天守と波(黄金比レイアウト)</title>
  <!-- 円相(欠けた円)。切れ目は右上 -->
  <path d="M 310 60 A 206 206 0 1 0 416 130" fill="none" stroke="#9fe0e8" stroke-width="24" stroke-linecap="round"/>
  <!-- 朝日(円相の切れ目に置く) -->
  <circle cx="368" cy="86" r="30" fill="#f7c948"/>

  <!--
    唐津城・天守(軒反り+白壁)
    コンテンツ全体(y=110〜384)を黄金比で分割した y≈279 に石垣の下端(=天守と海の境界)を置く
  -->
  <g fill="#9fe0e8">
    <!-- 最上層の屋根 -->
    <path d="M206 150 Q 234 145 256 110 Q 278 145 306 150 Z"/>
    <!-- 最上層の壁 -->
    <rect x="236" y="150" width="40" height="18"/>
    <!-- 中層の屋根 -->
    <path d="M190 192 Q 224 187 256 164 Q 288 187 322 192 Z"/>
    <!-- 中層の壁 -->
    <rect x="228" y="192" width="56" height="20"/>
    <!-- 下層の屋根 -->
    <path d="M174 236 Q 214 231 256 206 Q 298 231 338 236 Z"/>
    <!-- 石垣(武者返しの反り)。下端 y=282 -->
    <path d="M230 244 L 282 244 Q 288 266 312 282 L 200 282 Q 224 266 230 244 Z"/>
  </g>

  <!-- 波(振幅を抑えて軽く。下端と円相の間に余白を残す) -->
  <g fill="none" stroke="#9fe0e8" stroke-linecap="round">
    <path d="M132 318c42-24 82-24 124 0s82 24 124 0" stroke-width="19"/>
    <path d="M150 364c30-18 60-18 90 0s60 18 90 0" stroke-width="13" opacity=".5"/>
  </g>
</svg>
