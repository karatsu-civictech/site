# ハブ civictech-karatsu.org のパス振り分け Worker。
# /gikai* を gikai アプリ（別 Pages プロジェクト）へ転送する。
# 新しいアプリを増やすときは src/index.js の ROUTES と routes を追記する。
name = "karatsu-civictech-router"
main = "src/index.js"
compatibility_date = "2025-01-01"

routes = [
  { pattern = "civictech-karatsu.org/gikai", zone_name = "civictech-karatsu.org" },
  { pattern = "civictech-karatsu.org/gikai/*", zone_name = "civictech-karatsu.org" },
  { pattern = "civictech-karatsu.org/keizai", zone_name = "civictech-karatsu.org" },
  { pattern = "civictech-karatsu.org/keizai/*", zone_name = "civictech-karatsu.org" },
  { pattern = "civictech-karatsu.org/people-flow", zone_name = "civictech-karatsu.org" },
  { pattern = "civictech-karatsu.org/people-flow/*", zone_name = "civictech-karatsu.org" },
]
